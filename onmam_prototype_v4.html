<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>온맘마켓 — 인터랙티브 프로토타입 v4 (플로우 연결)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --p:#1A6840;--p2:#2A9E5F;--p-lt:#EAF7F0;
  --acc:#FF5C38;--acc-lt:#FFF1EE;
  --warn:#FF9500;--warn-lt:#FFF8EC;
  --dk:#111827;--g1:#4B5563;--g2:#9CA3AF;--g3:#E5E7EB;--g4:#F5F6F8;
  --card:#fff;
  --r-sm:12px;--r:16px;--r-lg:24px;--r-xl:32px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow:0 2px 8px rgba(0,0,0,.07),0 8px 24px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#EDEEF2;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

.proto-hd{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(17,24,39,.97);backdrop-filter:blur(12px);
  padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.proto-hd-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#D1FAE5;letter-spacing:.3px;}
.mode-pills{display:flex;background:rgba(255,255,255,.08);border-radius:50px;padding:3px;gap:2px;}
.mode-pill{padding:6px 18px;font-size:12px;font-weight:700;border:none;background:transparent;color:rgba(255,255,255,.5);border-radius:50px;transition:all .2s;}
.mode-pill.on{background:#1A6840;color:#fff;}

.consumer-wrap{display:flex;align-items:flex-start;justify-content:center;gap:28px;padding:72px 24px 40px;}
.phone{width:375px;height:812px;flex-shrink:0;position:relative;background:#fff;border-radius:50px;overflow:hidden;box-shadow:0 0 0 10px #1c1c1e,0 0 0 12px #3a3a3c,0 28px 60px rgba(0,0,0,.5);}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#1c1c1e;border-radius:0 0 22px 22px;z-index:50;}
.phone-inner{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.sbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 6px;font-size:12px;font-weight:600;flex-shrink:0;}
.screen-scroll{flex:1;overflow-y:auto;overflow-x:hidden;}
.screen-scroll::-webkit-scrollbar{display:none;}

/* 바텀탭 - 새 디자인 */
.btab{
  flex-shrink:0;height:76px;background:#fff;
  border-top:1px solid var(--g3);
  display:flex;padding:6px 8px 18px;gap:4px;
}
.btab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:transparent;cursor:pointer;border-radius:14px;
  transition:background .15s;
}
.btab-item:active{background:#F3F4F6;}
.btab-icon-wrap{
  width:42px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:14px;transition:all .2s;
}
.btab-item.on .btab-icon-wrap{background:var(--p-lt);}
.btab-icon{font-size:20px;line-height:1;}
.btab-label{font-size:10px;font-weight:600;color:var(--g2);}
.btab-item.on .btab-label{color:var(--p);font-weight:800;}

/* 공통 */
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:50px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.chip-outline{border:1.5px solid var(--g3);color:var(--g1);background:#fff;}
.chip-active{background:var(--p);color:#fff;border:1.5px solid var(--p);}
.chip-red{background:#FEE2E2;color:#DC2626;}
.chip-green{background:#D1FAE5;color:#065F46;}
.chip-orange{background:#FFEDD5;color:#C2410C;}
.chip-blue{background:#DBEAFE;color:#1D4ED8;}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow-sm);}
.btn-p{width:100%;padding:16px;border:none;border-radius:var(--r);background:var(--p);color:#fff;font-size:15px;font-weight:800;letter-spacing:.2px;transition:opacity .15s;}
.btn-p:active{opacity:.85;}
.btn-outline{width:100%;padding:15px;border:2px solid var(--p);border-radius:var(--r);background:#fff;color:var(--p);font-size:14px;font-weight:700;}
.gauge{background:var(--g3);border-radius:50px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:50px;transition:width .4s ease;}
.grad-hd{background:linear-gradient(140deg,#1A6840 0%,#2A9E5F 100%);padding:0 18px;flex-shrink:0;}

/* 지도 - 업그레이드 */
.map-bg{background:linear-gradient(160deg,#d4edda 0%,#c8e6d0 50%,#d8ead0 100%);position:relative;overflow:hidden;}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.35) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.35) 1px,transparent 1px);background-size:28px 28px;}
.map-road{position:absolute;background:rgba(255,255,255,.7);}
.map-road-label{position:absolute;background:rgba(255,255,255,.6);font-size:9px;font-weight:700;color:#4B5563;padding:2px 6px;border-radius:4px;}
.m-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;transition:all .4s ease;}
.m-pin-card{background:#fff;border-radius:10px;padding:6px 10px;box-shadow:var(--shadow);white-space:nowrap;}
.m-pin-card.hot{background:var(--acc);color:#fff;}
.m-pin-tail{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #fff;margin:0 auto;}
.m-pin-tail.hot{border-top-color:var(--acc);}
.my-dot-wrap{position:absolute;transform:translate(-50%,-50%);}
.my-dot{width:16px;height:16px;border-radius:50%;background:#1D4ED8;border:3px solid #fff;box-shadow:0 0 0 5px rgba(29,78,216,.2);}
.my-dot-pulse{position:absolute;width:32px;height:32px;border-radius:50%;background:rgba(29,78,216,.12);top:-8px;left:-8px;}

/* 지역 선택 드롭다운 */
.loc-bar{
  position:absolute;top:12px;left:10px;right:10px;z-index:10;
  display:flex;gap:8px;align-items:center;
}
.loc-selector{
  flex:1;background:#fff;border-radius:14px;padding:10px 14px;
  display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.14);
  cursor:pointer;border:none;
}
.loc-compass{
  width:34px;height:34px;background:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.14);border:none;flex-shrink:0;
}

/* 재검색 버튼 */
.research-btn{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
  background:#fff;border:none;border-radius:50px;padding:8px 18px;
  font-size:12px;font-weight:800;color:var(--p);
  box-shadow:0 4px 16px rgba(0,0,0,.18);display:flex;align-items:center;gap:6px;
  white-space:nowrap;transition:all .2s;
}
.research-btn:active{transform:translateX(-50%) scale(.96);}

/* 토스트 */
.toast{
  position:absolute;top:72px;left:50%;transform:translateX(-50%);z-index:30;
  background:var(--dk);color:#fff;border-radius:50px;padding:8px 16px;
  font-size:12px;font-weight:700;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}

/* 마켓 하단 카드 리스트 */
.mkt-shelf{
  background:#fff;border-top:1px solid var(--g3);padding:14px 0 10px;flex-shrink:0;
}
.mkt-shelf-hd{display:flex;justify-content:space-between;align-items:center;padding:0 16px;margin-bottom:10px;}
.mkt-shelf-title{font-size:13px;font-weight:800;color:var(--dk);}
.mkt-card-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;}
.mkt-card-scroll::-webkit-scrollbar{display:none;}
.mkt-card-mini{
  flex-shrink:0;width:158px;background:var(--g4);border-radius:var(--r);padding:12px;
  cursor:pointer;border:1.5px solid transparent;transition:all .2s;
}
.mkt-card-mini:active{transform:scale(.97);}
.mkt-card-mini.sel{border-color:var(--p);background:var(--p-lt);}

/* 피드 화면 상단 바 */
.feed-top{background:#fff;border-bottom:1px solid #F3F4F6;padding:10px 16px 10px;}

/* 상품 카드 */
.pcard{background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:10px;cursor:pointer;transition:transform .12s;}
.pcard:active{transform:scale(.985);}

/* 가이드 패널 */
.guide-pane{background:#fff;border-radius:20px;padding:24px;box-shadow:var(--shadow);width:264px;flex-shrink:0;align-self:flex-start;}
.gp-title{font-size:13px;font-weight:800;color:var(--dk);margin-bottom:16px;}
.gp-row{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start;}
.gp-num{width:22px;height:22px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.gp-txt{font-size:12px;color:var(--g1);line-height:1.55;}
.gp-lbl{font-size:10px;font-weight:700;color:var(--p);background:var(--p-lt);padding:2px 8px;border-radius:50px;display:inline-block;margin-bottom:3px;}
.gp-note{background:var(--warn-lt);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--warn);font-weight:600;border:1px solid #FFE5A8;margin-top:16px;}

/* 사장님 대시보드 */
.dash-wrap{display:flex;height:calc(100vh - 52px);margin-top:52px;}
.dash-side{width:228px;background:#111827;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;}
.ds-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.ds-logo-name{font-size:16px;font-weight:800;color:#D1FAE5;display:flex;align-items:center;gap:6px;}
.ds-logo-sub{font-size:11px;color:#6EE7B7;margin-top:3px;}
.ds-section-lbl{font-size:10px;font-weight:700;color:#6EE7B7;letter-spacing:.8px;padding:16px 16px 4px;}
.ds-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;margin:1px 8px;cursor:pointer;color:#9CA3AF;font-size:13px;font-weight:500;transition:all .15s;}
.ds-item:hover{background:rgba(255,255,255,.06);}
.ds-item.on{background:#1A6840;color:#fff;font-weight:700;}
.ds-item-ic{font-size:16px;width:20px;text-align:center;}
.ds-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);}
.ds-foot-stat{font-size:11px;color:#6EE7B7;margin-top:2px;}
.dash-main{flex:1;overflow-y:auto;background:#F4F6F4;padding:32px 36px;}
.dash-main::-webkit-scrollbar{width:4px;}
.dash-main::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.dm-title{font-size:24px;font-weight:800;color:var(--dk);}
.dm-sub{font-size:13px;color:var(--g2);margin-top:4px;margin-bottom:28px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi-c{background:#fff;border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--g3);}
.kpi-lbl{font-size:12px;font-weight:600;color:var(--g2);margin-bottom:8px;}
.kpi-val{font-size:26px;font-weight:800;}
.kpi-sub{font-size:11px;font-weight:600;color:var(--p);margin-top:4px;}
.dt-wrap{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;}
.dt-hd{padding:18px 22px;border-bottom:1px solid var(--g3);display:flex;justify-content:space-between;align-items:center;}
.dt-title{font-size:15px;font-weight:700;color:var(--dk);}
table{width:100%;border-collapse:collapse;}
th{background:#F9FAFB;padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--g2);border-bottom:1px solid var(--g3);letter-spacing:.3px;}
td{padding:13px 16px;font-size:13px;color:var(--g1);border-bottom:1px solid #F9FAFB;}
tr:last-child td{border:none;}
tr:hover td{background:#FAFBFA;}
.fw{background:#fff;border-radius:16px;padding:28px;box-shadow:var(--shadow-sm);}
.frow{margin-bottom:18px;}
.flabel{display:block;font-size:12px;font-weight:700;color:var(--dk);margin-bottom:6px;}
.finput{width:100%;padding:11px 14px;border:1.5px solid var(--g3);border-radius:10px;font-size:14px;color:var(--dk);outline:none;transition:border .2s;background:#fff;}
.finput:focus{border-color:var(--p);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fs-title{font-size:13px;font-weight:800;color:var(--p);margin:22px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--p-lt);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:24px;padding:32px;width:480px;text-align:center;}
.notice-bar{background:linear-gradient(90deg,#1A6840,#2A9E5F);padding:10px 18px;display:flex;align-items:center;gap:8px;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.pulse{animation:pulse 1.8s infinite;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp .25s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-in{animation:fadeIn .3s ease;}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{0%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-6px)}}

/* 듀얼 뷰 모드 */
.dual-wrap{display:flex;align-items:flex-start;justify-content:center;gap:48px;padding:72px 24px 40px;}
.dual-phone-section{display:flex;flex-direction:column;align-items:center;}
.dual-phone-label{font-size:11px;font-weight:700;color:#9CA3AF;text-align:center;margin-bottom:12px;letter-spacing:.5px;}
.dual-guide{width:320px;background:#fff;border-radius:20px;padding:20px;box-shadow:var(--shadow);margin-top:20px;}
.sync-indicator{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;background:#111827;color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:slideUp .3s ease;}
.sync-indicator.success{background:#059669;}
.sync-indicator.alert{background:#FF5C38;}
@keyframes syncPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#6EE7B7;animation:syncPulse 1.5s infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,createContext,useContext} = React;

/* ══════════════════════════════════════════════════════════════
   공유 상태 관리 시스템 (SharedStore)
   - 소비자 앱 ↔ 사장님 앱 간 실시간 데이터 동기화
   ══════════════════════════════════════════════════════════════ */

// 전역 상태 저장소
const SharedStoreContext = createContext(null);

function createSharedStore() {
  let listeners = [];
  let state = {
    // 실시간 예약 목록 (양쪽 앱에서 공유)
    liveReservations: [
      {id:"R-2341",user:"김지연",product:"제주 은갈치 특대 5마리",productId:1,qty:1,amount:18500,slot:"15:00–16:00",date:"3/5(수)",status:"예약완료",time:"09:15",img:"🐟",market:"온맘마켓 일산점",addr:"경기 고양시 일산동구 강촌로 27"},
    ],
    // 알림 목록
    alerts: [],
    // 마지막 동기화 이벤트 (UI 표시용)
    lastSync: null,
    // 예약 번호 시퀀스
    reservationSeq: 2342,
  };
  
  return {
    getState: () => state,
    setState: (partial) => {
      state = { ...state, ...partial };
      listeners.forEach(l => l(state));
    },
    subscribe: (listener) => {
      listeners.push(listener);
      return () => { listeners = listeners.filter(l => l !== listener); };
    },
    // 새 예약 추가 (소비자 앱에서 호출)
    addReservation: (product, qty, slot) => {
      const newId = `R-${state.reservationSeq}`;
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      const newResv = {
        id: newId,
        user: "김지연",
        product: product.name,
        productId: product.id,
        qty,
        amount: product.price * qty,
        slot,
        date: product.date,
        status: "예약완료",
        time: timeStr,
        img: product.img,
        market: `온맘마켓 ${product.market}`,
        addr: "경기 고양시 일산동구 강촌로 27",
        resvedAt: `3/2(월) 오후 ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`,
      };
      const newAlert = {
        id: Date.now(),
        type: "예약",
        icon: "📋",
        msg: `김지연님이 ${product.name} ${qty}개를 예약했어요`,
        time: timeStr,
        read: false,
        resvId: newId,
      };
      state = {
        ...state,
        liveReservations: [newResv, ...state.liveReservations],
        alerts: [newAlert, ...state.alerts],
        reservationSeq: state.reservationSeq + 1,
        lastSync: { type: 'new_reservation', data: newResv, timestamp: Date.now() },
      };
      listeners.forEach(l => l(state));
      return newResv;
    },
    // 픽업 완료 처리 (사장님 앱에서 호출)
    completePickup: (resvId) => {
      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      const resv = state.liveReservations.find(r => r.id === resvId);
      if (!resv) return null;
      
      const updatedReservations = state.liveReservations.map(r => 
        r.id === resvId ? { ...r, status: "픽업완료", paidAt: `3/2(월) 오후 ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}` } : r
      );
      const newAlert = {
        id: Date.now(),
        type: "픽업",
        icon: "✅",
        msg: `${resv.user}님이 ${resv.product}를 픽업 완료했어요`,
        time: timeStr,
        read: false,
        resvId,
      };
      state = {
        ...state,
        liveReservations: updatedReservations,
        alerts: [newAlert, ...state.alerts],
        lastSync: { type: 'pickup_complete', data: resv, timestamp: Date.now() },
      };
      listeners.forEach(l => l(state));
      return resv;
    },
    // 알림 읽음 처리
    markAlertRead: (alertId) => {
      state = {
        ...state,
        alerts: state.alerts.map(a => a.id === alertId ? { ...a, read: true } : a),
      };
      listeners.forEach(l => l(state));
    },
    markAllAlertsRead: () => {
      state = {
        ...state,
        alerts: state.alerts.map(a => ({ ...a, read: true })),
      };
      listeners.forEach(l => l(state));
    },
  };
}

// 커스텀 훅: 공유 상태 사용
function useSharedStore() {
  const store = useContext(SharedStoreContext);
  const [state, setState] = useState(store.getState());
  useEffect(() => {
    return store.subscribe(setState);
  }, [store]);
  return { state, ...store };
}

/* ── 지역별 데이터 ── */
const AREA_DATA = {
  "일산동구": {
    center:{x:"50%",y:"52%"},

function ExploreScreen({onMarket,onFeed}){
  const AREAS=["일산동구","덕양구","파주시"];
  const [area,setArea]=useState("일산동구");
  const [showDrop,setShowDrop]=useState(false);
  const [toast,setToast]=useState(null);
  const [showResearch,setShowResearch]=useState(false);
  const [selMkt,setSelMkt]=useState(null);
  const [animKey,setAnimKey]=useState(0);
  const areaData=AREA_DATA[area];

  function changeArea(a){
    setArea(a);setShowDrop(false);setAnimKey(k=>k+1);
    setShowResearch(false);
    const cnt=AREA_DATA[a].markets.length;
    setToast(`📍 ${a}으로 이동 — 마켓 ${cnt}곳 발견!`);
    setTimeout(()=>setToast(null),2800);
    setSelMkt(null);
  }
  function handleResearch(){
    setShowResearch(false);
    setAnimKey(k=>k+1);
    setToast(`🔄 재검색 완료 — ${areaData.markets.length}곳 발견!`);
    setTimeout(()=>setToast(null),2000);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="sbar" style={{background:"#fff",color:"#111827",flexShrink:0}}>
        <span style={{fontWeight:700}}>9:41</span><span>📶 🔋</span>
      </div>

      {/* 지도 영역 */}
      <div className="map-bg" style={{flex:"0 0 420px",position:"relative"}}>
        <div className="map-grid"/>
        {/* 도로 */}
        {areaData.roads.map((r,i)=>(
          <div key={i}>
            <div className="map-road" style={{top:r.top,left:r.left,right:r.right,bottom:r.bottom,height:r.height,width:r.width}}/>
            {r.label&&<div className="map-road-label" style={{top:r.ly||"40%",left:r.lx||"10%"}}>{r.label}</div>}
          </div>
        ))}
        {/* 내 위치 */}
        <div className="my-dot-wrap" style={{left:areaData.center.x,top:areaData.center.y}}>
          <div className="my-dot-pulse"/>
          <div className="my-dot"/>
        </div>
        {/* 마켓 핀 */}
        {areaData.markets.map(m=>(
          <div key={`${animKey}-${m.id}`} className="m-pin fade-in" style={{left:m.pin.x,top:m.pin.y}} onClick={()=>setSelMkt(m)}>
            <div className={`m-pin-card${m.hot?" hot":""}`}>
              <span style={{fontSize:11,fontWeight:800}}>{m.emoji} {m.name.replace("온맘마켓 ","")}</span><br/>
              <span style={{fontSize:9}}>{m.dist}{m.hot?" · 오늘 행사!":""}</span>
            </div>
            <div className={`m-pin-tail${m.hot?" hot":""}`}/>
          </div>
        ))}
        {/* 지역 선택 바 */}
        <div className="loc-bar">
          <button className="loc-selector" onClick={()=>setShowDrop(d=>!d)}>
            <span style={{fontSize:15}}>📍</span>
            <span style={{flex:1,textAlign:"left",fontSize:13,fontWeight:700,color:"#111827"}}>{area}</span>
            <span style={{fontSize:11,fontWeight:800,color:"#2A9E5F",background:"#EAF7F0",padding:"3px 8px",borderRadius:50,marginRight:4}}>{areaData.markets.length}곳</span>
            <span style={{fontSize:13,color:"#9CA3AF"}}>{showDrop?"▲":"▼"}</span>
          </button>
          <button className="loc-compass" onClick={()=>{setShowResearch(true);}}>🧭</button>
        </div>
        {/* 드롭다운 */}
        {showDrop&&(
          <div className="fade-in" style={{position:"absolute",top:60,left:10,right:54,background:"#fff",borderRadius:14,overflow:"hidden",zIndex:20,boxShadow:"0 8px 28px rgba(0,0,0,.18)"}}>

function ReservationScreen({p,qty,onBack,onConfirm}){
  const [selSlot,setSelSlot]=useState(null);
  const [agreed,setAgreed]=useState(false);
  const [loading,setLoading]=useState(false);
  const r=remain(p);
  const slots=["12:00–13:00","13:00–14:00","14:00–15:00","15:00–16:00","16:00–17:00","17:00–18:00"];

  const hotSlots={"13:00–14:00":18,"15:00–16:00":24,"16:00–17:00":11};

    setLoading(true);

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>

        </div>

        {/* 픽업 시간대 선택 */}
        <div className="card" style={{padding:"14px"}}>
          <div style={{fontSize:12,fontWeight:800,color:"#111827",marginBottom:3}}>⏰ 픽업 시간대 선택 <span style={{color:"#FF5C38"}}>*</span></div>

          {[
            "픽업일 전날까지 앱에서 무료 취소 가능",
            "픽업일 당일 취소 시 노쇼 0.5회 카운트",

          disabled={!selSlot||!agreed||loading}
          style={{
            width:"100%",padding:"16px",border:"none",borderRadius:14,fontSize:15,fontWeight:800,
            background:selSlot&&agreed?"#1A6840":"#E5E7EB",

/* ── 소비자 앱 컨테이너 ── */
function ConsumerApp(){
  const store = useContext(SharedStoreContext);
  const [storeState, setStoreState] = useState(store ? store.getState() : null);
  
  useEffect(() => {
    if (store) {
      return store.subscribe(setStoreState);
    }
  }, [store]);

  const [screen,setScreen]=useState("explore");
  const [tab,setTab]=useState("explore");
  const [selMarket,setSelMarket]=useState(null);
  const [selProduct,setSelProduct]=useState(null);
  const [qty,setQty]=useState(1);
  const [selSlot,setSelSlot]=useState(null);
  const [selResv,setSelResv]=useState(null);
  const [lastResvCode,setLastResvCode]=useState(null);

  function goTab(t){setTab(t);setScreen(t);}
  function goMarket(m){setSelMarket(m);setScreen("market");}
  function goProduct(p){setSelProduct(p);setScreen("product");}
  function goToReserve(p,q){setSelProduct(p);setQty(q);setSelSlot(null);setScreen("reservation");}
  function doConfirm(p,q,slot){
    setSelSlot(slot);
    // SharedStore에 예약 추가
    if (store) {
      const newResv = store.addReservation(p, q, slot);
      setLastResvCode(newResv.id);
    }
    setScreen("qr");
  }
  function goResvDetail(r){setSelResv(r);setScreen("resvDetail");}
  function goHome(){setTab("explore");setScreen("explore");setSelMarket(null);setSelProduct(null);setSelSlot(null);setLastResvCode(null);}

  const showNav=!["product","reservation","qr","resvDetail"].includes(screen);
  const isFullScreen=["product","reservation","qr","resvDetail"].includes(screen);
  const TABS=[
    {k:"explore",ic:"🗺️",lb:"탐색"},
    {k:"feed",ic:"📣",lb:"피드"},
    {k:"likes",ic:"❤️",lb:"찜"},
    {k:"my",ic:"👤",lb:"MY"},
  ];

  const renderScreen=()=>{
    switch(screen){
      case "explore": return <ExploreScreen onMarket={goMarket} onFeed={()=>goTab("feed")}/>;
      case "feed":    return <FeedScreen onProduct={goProduct}/>;
      case "likes":   return <LikesScreen onProduct={goProduct}/>;
      case "my":      return <MyScreen onResvDetail={goResvDetail}/>;
      case "market":  return <MarketScreen market={selMarket} onBack={()=>setScreen(tab==="feed"?"feed":"explore")} onProduct={goProduct}/>;
      case "product":     return <ProductScreen p={selProduct} onBack={()=>selMarket?setScreen("market"):setScreen(tab)} onGoToReserve={goToReserve}/>;
      case "reservation": return <ReservationScreen p={selProduct} qty={qty} onBack={()=>setScreen("product")} onConfirm={doConfirm}/>;
      case "qr":          return <QRScreen p={selProduct} qty={qty} slot={selSlot} onHome={goHome} reservationCode={lastResvCode}/>;
      case "resvDetail":  return <ReservationDetailScreen r={selResv} onBack={()=>setScreen("my")}/>;
      default: return null;
    }
  };

  return(
    <div className="phone-inner">
      {isFullScreen
        ? <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>{renderScreen()}</div>
        : <div className="screen-scroll">{renderScreen()}</div>
      }
      {showNav&&(
        <div className="btab">
          {TABS.map(({k,ic,lb})=>(
            <button key={k} className={`btab-item${tab===k?" on":""}`} onClick={()=>goTab(k)}>
              <div className="btab-icon-wrap">
                <span className="btab-icon">{ic}</span>
              </div>
              <span className="btab-label">{lb}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

              </div>
            </div>
          </div>
        </div>
      )}

      {/* 등록 버튼 */}
      <button onClick={handleSubmit} disabled={loading}
        style={{width:"100%",padding:"14px",background:loading?"#9CA3AF":"#1A6840",color:"#fff",border:"none",borderRadius:12,fontWeight:800,fontSize:15,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",transition:"background .2s"}}>
        {loading?"⏳ 등록 중...":"🚀 상품 등록하기"}
      </button>
      <div style={{height:20}}/>
    </div>
  );
}

                {noticeStep==="compose"?(

    </div>

}

/* ─── 예약 관리 (모바일) ─── */
function StoreResvScreen(){
  const store = useContext(SharedStoreContext);
  const [storeState, setStoreState] = useState(store ? store.getState() : null);
  
  useEffect(() => {
    if (store) {
      return store.subscribe(setStoreState);
    }
  }, [store]);

  const [filter,setFilter]=useState("전체");
  const [showQR,setShowQR]=useState(false);
  const [qrScanning,setQrScanning]=useState(false);
  const [qrSuccess,setQrSuccess]=useState(null);
  
  // SharedStore 데이터 사용 (없으면 기본 데이터)
  const reservations = storeState?.liveReservations || STORE_RESERVATIONS;
  
  const filters=["전체","예약완료","픽업완료","노쇼"];
  const sColor=(s)=>s==="예약완료"?"#1D4ED8":s==="픽업완료"?"#059669":"#DC2626";
  const sBg=(s)=>s==="예약완료"?"#DBEAFE":s==="픽업완료"?"#D1FAE5":"#FEE2E2";
  const filtered=filter==="전체"?reservations:reservations.filter(r=>r.status===filter);
  
  const markPickup=(id)=>{
    if (store) {
      store.completePickup(id);
    }
  };
  
  const handleQRScan = () => {
    const pendingResv = reservations.find(r => r.status === "예약완료");
    if (pendingResv && store) {
      setQrScanning(true);
      setTimeout(() => {
        store.completePickup(pendingResv.id);
        setQrScanning(false);
        setQrSuccess(pendingResv);
        setTimeout(() => {
          setQrSuccess(null);
          setShowQR(false);
        }, 2000);
      }, 1500);
    }
  };
  
  const cnt=(f)=>reservations.filter(r=>r.status===f).length;
  return(
    <div style={{background:"#F9FAFB",minHeight:"100%"}}>
      <div style={{background:"linear-gradient(145deg,#0f4d2e,#1A6840)",padding:"0 16px 18px"}}>
        <div className="sbar" style={{color:"rgba(255,255,255,.6)"}}><span style={{fontWeight:700,color:"#fff"}}>9:41</span><span>📶 🔋</span></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff"}}>예약 관리</div>
          <button onClick={()=>setShowQR(true)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:"rgba(255,255,255,.2)",color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:700}}>
            📷 QR 스캔
          </button>
        </div>
        {/* KPI */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:14}}>
          {[{l:"대기",v:cnt("예약완료"),c:"#FCD34D"},{l:"완료",v:cnt("픽업완료"),c:"#6EE7B7"},{l:"노쇼",v:cnt("노쇼"),c:"#FCA5A5"}].map((k,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,.12)",borderRadius:10,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:900,color:k.c}}>{k.v}</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.6)"}}>{k.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 필터 */}
      <div style={{padding:"14px 16px 0",display:"flex",gap:8,overflowX:"auto"}}>
        {filters.map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{padding:"6px 14px",borderRadius:50,border:"1px solid",flexShrink:0,
            borderColor:filter===f?"#1A6840":"#E5E7EB",
            background:filter===f?"#1A6840":"#fff",
            color:filter===f?"#fff":"#6B7280",fontSize:12,fontWeight:700}}>
            {f}{f!=="전체"?` (${cnt(f)})`:` (${reservations.length})`}
          </button>
        ))}
      </div>

      {/* 목록 */}
      <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {filtered.map(rv=>(
          <div key={rv.id} style={{background:"#fff",borderRadius:14,padding:"14px",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:34,height:34,borderRadius:50,background:sBg(rv.status),display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>
                  {rv.status==="픽업완료"?"✅":rv.status==="노쇼"?"⚠️":"📋"}
                </div>
                <div>
                  <div style={{fontSize:14,fontWeight:800}}>{rv.name||rv.user}</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>{rv.id} · {rv.time}</div>
                </div>
              </div>
              <span style={{fontSize:10,padding:"3px 10px",borderRadius:50,background:sBg(rv.status),color:sColor(rv.status),fontWeight:700}}>{rv.status}</span>
            </div>
            <div style={{background:"#F9FAFB",borderRadius:10,padding:"10px 12px",marginBottom:rv.status==="예약완료"?10:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:3}}>{rv.product}</div>
              <div style={{display:"flex",gap:12,fontSize:11,color:"#9CA3AF"}}>
                <span>×{rv.qty}개</span>
                <span>⏰ {rv.slot}</span>
                <span style={{color:"#111827",fontWeight:700}}>₩{(rv.price||rv.amount||0).toLocaleString()}</span>
              </div>
            </div>
            {rv.status==="예약완료"&&(
              <button onClick={()=>markPickup(rv.id)} style={{width:"100%",padding:"10px",background:"#1A6840",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                ✅ 픽업 완료 처리
              </button>
            )}
          </div>
        ))}
      </div>

      {/* QR 스캔 모달 */}
      {showQR&&(
        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.7)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:300}} onClick={()=>setShowQR(false)}>
          <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"24px 20px 36px"}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,background:"#E5E7EB",borderRadius:50,margin:"0 auto 20px"}}/>
            <div style={{fontSize:17,fontWeight:800,marginBottom:4,textAlign:"center"}}>QR 스캔</div>
            <div style={{background:"#0f4d2e",borderRadius:20,height:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",marginBottom:16,gap:6,position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:"40%",left:"8%",right:"8%",height:2,background:"#6EE7B7",boxShadow:"0 0 8px #6EE7B7",borderRadius:50}}/>
              <div style={{fontSize:36}}>📷</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.7)"}}>QR 코드를 프레임 안에</div>
            </div>
            <button onClick={()=>setShowQR(false)} style={{width:"100%",padding:"13px",background:"#F3F4F6",border:"none",borderRadius:12,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>닫기</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── 상품 등록 (모바일 간소화) ─── */
function StoreRegScreen(){
  const EMOJIS=["🐟","🥚","🍎","🥩","🫐","🌽","🧅","🍊","🐄","🍋"];
  const CATS=["신선식품","달걀·잡곡","과일","채소","육류","기타"];
  const [selEmoji,setSelEmoji]=useState("🐟");
  const [name,setName]=useState("");
  const [cat,setCat]=useState("신선식품");
  const [origPrice,setOrigPrice]=useState("");
  const [salePrice,setSalePrice]=useState("");
  const [totalQty,setTotalQty]=useState("");
  const [pickDate,setPickDate]=useState("2026-03-09");
  const [selSlots,setSelSlots]=useState(["11:00~12:00"]);
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const SLOTS=["11:00~12:00","13:00~14:00","14:00~15:00","15:00~16:00"];
  const discPct=origPrice&&salePrice?Math.round((1-Number(salePrice)/Number(origPrice))*100):0;
  const toggleSlot=(s)=>setSelSlots(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const handleSubmit=()=>{
    if(!name||!salePrice||!totalQty)return;
    setLoading(true);setTimeout(()=>{setLoading(false);setDone(true);},1400);
  };
  if(done)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16,textAlign:"center",padding:24,background:"#fff"}}>
      <div style={{fontSize:72}}>✅</div>
      <div style={{fontSize:20,fontWeight:800}}>등록 완료!</div>
      <div style={{fontSize:13,color:"#6B7280",lineHeight:1.6}}>"{name}"이 등록되어<br/>고객에게 공개됩니다.</div>
      <div style={{background:"#ECFDF5",border:"1px solid #A7F3D0",borderRadius:16,padding:"18px 24px",width:"100%"}}>
        <div style={{fontSize:40,marginBottom:8}}>{selEmoji}</div>
        <div style={{fontWeight:800,fontSize:15}}>{name}</div>

                      <div>
                        <div style={{fontSize:12,fontWeight:700,color:"#111827"}}>{t}</div>
                        <div style={{fontSize:11,color:"#9CA3AF"}}>{d}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}
        
        {mode==="consumer"&&(
          <div className="consumer-wrap">
            <div style={{width:375,flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textAlign:"center",marginBottom:12,letterSpacing:.5}}>CONSUMER APP · v4</div>
              <div className="phone">
                <div className="phone-notch"/>
                <ConsumerApp/>
              </div>
            </div>
            <div className="guide-pane" style={{marginTop:34}}>
              <div className="gp-title">📱 화면 탐색 가이드 v4</div>
              {[
                ["탐색 (지도)","지역 드롭다운 탭 → 다른 구/시 선택 → 새 마켓 발견 토스트 핀 탭 → 마켓 카드 선택 → 바로가기"],
                ["피드","📣 탭 → 카테고리 필터 → FOMO 지표 확인"],
                ["상품 예약","상품 탭 → 수량 선택 → 예약하기 → QR 발급"],
                ["찜 / MY","❤️ 찜 탭, 👤 MY 탭"],
              ].map(([lbl,txt],i)=>(
                <div key={i} className="gp-row">
                  <div className="gp-num">{i+1}</div>
                  <div><div className="gp-lbl">{lbl}</div><div className="gp-txt">{txt}</div></div>
                </div>
              ))}
              <div className="gp-note">💡 '플로우 데모' 모드에서 양쪽 앱 동기화를 확인하세요</div>
            </div>
          </div>
        )}
        {mode==="storeApp"&&(
          <div className="consumer-wrap">
            <div style={{width:375,flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:700,color:"#9CA3AF",textAlign:"center",marginBottom:12,letterSpacing:.5}}>STORE OWNER APP · v2</div>
              <div className="phone">
                <div className="phone-notch"/>
                <StoreApp/>
              </div>
            </div>
            <div className="guide-pane" style={{marginTop:34}}>
              <div className="gp-title">🏪 사장님 앱 가이드</div>
              {[
                ["🏠 홈","오늘 예약 KPI 한눈에 파악 빠른 액션 → QR 스캔 / 공지 발송 / 상품 등록"],
                ["📋 예약 관리","실시간 예약 목록 · 상태 필터 '픽업 완료 처리' 버튼 · QR 스캔 확인"],
                ["➕ 상품 등록","이모지 선택 → 가격 입력 → 픽업 일정 등록 즉시 소비자 앱에 노출"],
                ["🔔 알림","예약·노쇼·마감임박 실시간 알림 읽음 처리 가능"],
                ["🏪 MY","마켓 프로필 · 구독 플랜 확인 CRM·매출분석 바로가기"],
              ].map(([lbl,txt],i)=>(
                <div key={i} className="gp-row">
                  <div className="gp-num">{i+1}</div>
                  <div><div className="gp-lbl">{lbl}</div><div className="gp-txt">{txt}</div></div>
                </div>
              ))}
              <div className="gp-note">💡 '플로우 데모' 모드에서 소비자 예약이 실시간 반영됩니다</div>
            </div>
          </div>
        )}
        {mode==="store"&&(
          <StoreDash/>
        )}
        
        {/* 동기화 토스트 알림 */}
        {syncToast && (
          <div className={`sync-indicator ${syncToast.type}`}>
            <div className="sync-dot"/>
            {syncToast.msg}
          </div>
        )}
      </div>
    </SharedStoreContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
