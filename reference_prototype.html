  --gray-50: #F9FAFB;

/* 프로토타입 래퍼 */

}

/* 폰 프레임 */

  width: 375px;

  border-radius: 50px;
  overflow: hidden;
  position: relative;
  box-shadow:

    0 0 0 12px #3a3a3c,

  flex-shrink: 0;
}
.phone-notch {
  position: absolute;
  top: 0;
  left: 50%;

  border-radius: 0 0 20px 20px;

}
.phone-inner {

}

/* 상태바 */
.status-bar {

  font-size: 14px;
  font-weight: 600;
  padding-bottom: 8px;
  flex-shrink: 0;

}

/* 스크롤 영역 */
.screen-content {

  overflow-x: hidden;
}

/* 바텀 네비게이션 */

  flex-shrink: 0;
}
.nav-item {
  flex: 1;

  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border-radius: 12px;

}
.nav-item:active { background: var(--gray-100); }
.nav-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 8px;
}
.nav-item.active .nav-icon { background: var(--primary-light); }
.nav-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--gray-400);
}
.nav-item.active .nav-label { color: var(--primary); font-weight: 700; }
.nav-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 16px;
  height: 16px;
  background: var(--accent);
  color: white;
  font-size: 9px;
  font-weight: 800;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 공구 피드 카드 */
.gonggu-card {
  background: var(--white);
  margin: 12px 16px;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.gonggu-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--gray-100);
}
.gonggu-avatar {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), #2A9E5F);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.gonggu-market-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--dark);
}
.gonggu-market-sub {
  font-size: 11px;
  color: var(--gray-500);
  margin-top: 2px;
}
.gonggu-status {
  margin-left: auto;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.status-upcoming { background: #DBEAFE; color: #1D4ED8; }
.status-open { background: #D1FAE5; color: #065F46; }
.status-closing { background: #FEE2E2; color: #DC2626; }
.status-arrived { background: var(--kakao); color: var(--kakao-dark); }
.status-done { background: var(--gray-200); color: var(--gray-500); }

/* 공구 이미지 영역 */
.gonggu-image {

  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.gonggu-image-badge {

  font-weight: 800;

.gonggu-image-emoji {

}
.gonggu-image-title {

  color: var(--dark);
  text-align: center;

}
.gonggu-image-desc {

/* 공구 정보 영역 */

.gonggu-tag {

.gonggu-price-row {

.gonggu-price {

.gonggu-discount {

.gonggu-progress-label {

.gonggu-progress-count {

.gonggu-progress-bar {

}
.gonggu-progress-fill {

}
.btn-outline {

  font-weight: 700;

}

  padding: 20px;
  animation: slideUp 0.3s ease;
  max-height: 85%;
  overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  border-radius: 50px;
  margin: 0 auto 16px;
}
.sheet-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--dark);
  margin-bottom: 4px;
}
.sheet-subtitle {

  margin-bottom: 20px;
}

  50% { opacity: 0.6; }

/* 토스트 */
.toast {
  position: absolute;

  left: 50%;

  background: var(--dark);

  padding: 12px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;

  from { opacity: 0; transform: translateX(-50%) translateY(20px); }

/* 입고 알림 배너 */

.arrival-banner-list {
  font-size: 13px;
  color: var(--kakao-dark);
  line-height: 1.6;
}
</style>

// 상태 뱃지 컴포넌트
function StatusBadge({ status }) {
  const config = {
    upcoming: { label: "입고예정", className: "status-upcoming" },
    open: { label: "예약중", className: "status-open" },
    closing: { label: "마감임박", className: "status-closing" },
    arrived: { label: "입고완료", className: "status-arrived" },
    done: { label: "마감", className: "status-done" },
  };
  const { label, className } = config[status] || config.done;
  return <span className={`gonggu-status ${className}`}>{label}</span>;
}

// 공구 카드 컴포넌트 (리스트형)
function GongguCard({ gonggu, market, onReserve }) {
  const percent = Math.round((gonggu.reserved / gonggu.total) * 100);
  const remaining = gonggu.total - gonggu.reserved;
  const discount = Math.round((1 - gonggu.price / gonggu.originalPrice) * 100);
  
  const progressColor = percent >= 90 
    ? "#DC2626"
    : percent >= 70 
    ? "#F59E0B"
    : "#059669";

  return (
    <div className="gonggu-card" style={{ padding: 16 }}>
      {/* 상단: 마켓 + 상태 */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>{market.emoji}</span>
          <span style={{ fontSize: 12, color: "var(--gray-500)", fontWeight: 600 }}>{market.name}</span>
        </div>
        <StatusBadge status={gonggu.status} />
      </div>
      
      {/* 메인: 이미지 + 정보 */}
      <div style={{ display: "flex", gap: 14 }}>
        {/* 작은 이미지 */}
        <div style={{ 
          width: 72, 
          height: 72, 
          background: gonggu.imageColor,
          borderRadius: 14,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 36,
          flexShrink: 0
        }}>
          {gonggu.emoji}
        </div>
        
        {/* 정보 */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "var(--dark)", marginBottom: 4, lineHeight: 1.3 }}>

          </div>

          </span>
          <span style={{ fontSize: 11, fontWeight: 700, color: remaining <= 10 ? "var(--accent)" : "var(--gray-500)" }}>

        <div style={{ height: 6, background: "var(--gray-200)", borderRadius: 50, overflow: "hidden", marginBottom: 12 }}>
          <div style={{ height: "100%", width: `${percent}%`, background: progressColor, borderRadius: 50 }} />

// 메인 앱
function ConsumerApp() {
  const [tab, setTab] = useState("feed");
  const [reservations, setReservations] = useState(INITIAL_MY_RESERVATIONS);
  const [selectedGonggu, setSelectedGonggu] = useState(null);
  const [completeReservation, setCompleteReservation] = useState(null);
  const [toast, setToast] = useState(null);
  
  const handleReserve = (gonggu) => {
    setSelectedGonggu(gonggu);
  };
  
  const handleConfirmReserve = (gonggu, qty) => {
    const market = MARKETS.find(m => m.id === gonggu.marketId);
    const newReservation = {
      id: `R-${1002 + reservations.length}`,
      gongguId: gonggu.id,
      title: gonggu.title,
      emoji: gonggu.emoji,
      marketName: market.name,
      qty,
      price: gonggu.price * qty,
      status: "예약완료",
      reservedAt: "방금 전",
      pickupDate: gonggu.pickupDate,
    };
    
    setReservations(prev => [newReservation, ...prev]);
    setSelectedGonggu(null);
    setCompleteReservation(newReservation);
  };
  
  const unreadCount = reservations.filter(r => r.status === "입고완료").length;
  
  const renderScreen = () => {
    switch (tab) {
      case "feed":
        return <FeedScreen onReserve={handleReserve} />;
      case "map":
        return <MapScreen />;
      case "reservations":
        return <MyReservationsScreen reservations={reservations} />;
      case "mypage":
        return <MyPageScreen />;
      default:
        return <FeedScreen onReserve={handleReserve} />;
    }
  };
  
  return (
    <div className="phone-inner">
      <div className="screen-content">
        {renderScreen()}
      </div>
      
      {/* 바텀 네비게이션 */}
      <div className="bottom-nav">
        {[
          { key: "feed", icon: "📣", label: "공구" },
          { key: "map", icon: "🗺️", label: "지도" },
          { key: "reservations", icon: "📋", label: "내 예약", badge: unreadCount },
          { key: "mypage", icon: "👤", label: "MY" },
        ].map(item => (
          <button 
            key={item.key}
            className={`nav-item ${tab === item.key ? "active" : ""}`}
            onClick={() => setTab(item.key)}
            style={{ position: "relative" }}
          >
            <div className="nav-icon">{item.icon}</div>
            <div className="nav-label">{item.label}</div>
            {item.badge > 0 && <div className="nav-badge">{item.badge}</div>}
          </button>
        ))}
      </div>
      
      {/* 예약 바텀시트 */}
      {selectedGonggu && (
        <ReserveSheet 
          gonggu={selectedGonggu}
          market={MARKETS.find(m => m.id === selectedGonggu.marketId)}
          onClose={() => setSelectedGonggu(null)}
          onConfirm={handleConfirmReserve}
        />
      )}
      
      {/* 예약 완료 시트 */}
      {completeReservation && (
        <ReserveCompleteSheet 
          reservation={completeReservation}
          onClose={() => setCompleteReservation(null)}
        />
      )}
      
      {/* 토스트 */}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

  return (
